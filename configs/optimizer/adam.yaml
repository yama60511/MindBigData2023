# ── Optimizer: Adam ───────────────────────────────────────────────
# Adaptive moment estimation. Fast convergence, good all-purpose default.
# Use AdamW instead if overfitting is a concern.
#
# Switch from CLI:  python main.py optimizer=adam

name: Adam
lr: 1e-4                 # Learning rate
betas: [0.9, 0.999]      # Momentum coefficients (β1, β2)
eps: 1.0e-8              # Numerical stability term
