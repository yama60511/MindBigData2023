# ── CTNet — Convolutional Transformer Network ──────────────────────
# Paper: Zhao et al.
# EEGNet-style CNN front-end followed by a Transformer encoder.
# Combines local feature extraction (CNN) with global attention (Transformer).
#
# Override from CLI:
#   python main.py model=ctnet model.depth=4 model.n_heads=8
#
_model_name_: ctnet         # Internal key (do not change)

nb_classes: 10              # Number of output classes (digits 0-9)
channels: 128               # Number of EEG channels
samples: 500                # Number of time samples per trial
lr: 1e-4                    # Learning rate

# ── CNN Front-end (same style as EEGNet) ──
F1: 32                      # Number of temporal filters
D: 2                        # Depth multiplier for spatial convolution
F2: 64                     # Number of pointwise filters (= F1 × D)
kern_len: 125               # Temporal kernel length (= sfreq // 2)

# ── Transformer Back-end ──
n_heads: 8                  # Number of multi-head attention heads
                            # → Try: 2, 4, 8
depth: 4                    # Number of Transformer encoder layers
                            # → Try: 1, 2, 4
ff_dim: 256                 # Feed-forward hidden dimension in Transformer
                            # → Try: 64, 128, 256, 512
dropout: 0.1                # Dropout rate for regularization
