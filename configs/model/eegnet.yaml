# ── EEGNet — Compact CNN baseline ──────────────────────────────────
# Paper: Lawhern et al. (2018)
# A lightweight CNN designed specifically for EEG. Good starting point.
#
# Override from CLI:
#   python main.py model=eegnet model.lr=5e-4 model.dropout=0.3
#
_model_name_: eegnet        # Internal key (do not change)

nb_classes: 10              # Number of output classes (digits 0-9)
channels: 128               # Number of EEG channels
samples: 500                # Number of time samples per trial
lr: 1e-3                    # Learning rate → try 5e-4, 1e-4 for finer tuning

# ── Architecture ──
F1: 8                       # Number of temporal filters (1st conv layer)
                            # → More filters = captures more temporal patterns
                            # → Try: 4, 8, 16, 32
D: 2                        # Depth multiplier for depthwise spatial conv
                            # → Controls how many spatial filters per temporal filter
                            # → Total spatial filters = F1 × D
F2: 16                      # Number of separable pointwise filters
                            # → Typically F2 = F1 × D
kern_len: 125               # Temporal kernel length (= sfreq // 2)
                            # → Larger = captures slower oscillations
                            # → Try: 64, 125, 250
dropout: 0.5                # Dropout rate for regularization (0.0 - 1.0)
                            # → Lower if model underfits, higher if overfits
