# ── ATCNet — Attention Temporal Convolutional Network ──────────────
# Paper: Altaheri et al. (2022)
# Hybrid: EEGNet-style front-end + sliding-window attention + TCN.
# Designed for motor imagery but works well on general EEG classification.
#
# Override from CLI:
#   python main.py model=atcnet model.lr=5e-4 model.n_windows=3
#
_model_name_: atcnet        # Internal key (do not change)

nb_classes: 10              # Number of output classes (digits 0-9)
channels: 128               # Number of EEG channels
samples: 500                # Number of time samples per trial
lr: 1e-3                    # Learning rate

# ── Architecture ──
F1: 16                      # Number of temporal filters
                            # → Try: 8, 16, 32
D: 2                        # Depth multiplier for spatial convolution
kern_len: 64                # Temporal kernel length
                            # → Smaller than EEGNet (captures faster dynamics)
n_windows: 5                # Number of sliding attention windows
                            # → More windows = finer temporal resolution
                            # → Try: 3, 5, 7
tcn_channels: 32            # Hidden channels in the TCN block
                            # → Try: 16, 32, 64
n_heads: 2                  # Multi-head attention heads
                            # → Try: 1, 2, 4
dropout: 0.3                # Dropout rate (ATCNet often uses lower dropout)
