# ── LMDA-Net — Lightweight Multi-Dimensional Attention ─────────────
# Paper: Miao et al. (2023)
# EEGNet-like backbone enhanced with channel and temporal attention.
# Lightweight and efficient — good balance of speed and accuracy.
#
# Override from CLI:
#   python main.py model=lmda_net model.F1=16 model.D=4
#
_model_name_: lmda_net      # Internal key (do not change)

channels: 128               # Number of EEG channels
samples: 500                # Number of time samples per trial
# ── Architecture ──
F1: 32                      # Number of temporal filters
                            # → Try: 8, 16, 32, 64
D: 2                        # Depth multiplier for spatial convolution
F2: 64                     # Number of pointwise filters (typically F1 × D)
kern_len: 125               # Temporal kernel length (= sfreq // 2)
dropout: 0.1                # Dropout rate for regularization
