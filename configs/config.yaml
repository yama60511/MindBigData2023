# @package _global_
#
# MindBigData2023 — Main Hydra Configuration
# ===========================================
#
# Config groups (swap any from CLI):
#   model        → configs/model/*.yaml         (which architecture)
#   data         → configs/data/*.yaml          (dataset & loading)
#   preprocessing→ configs/preprocessing/*.yaml (transforms applied to EEG)
#   trainer      → configs/trainer/*.yaml       (epochs, optimizer, hardware)
#   wandb        → configs/wandb/*.yaml         (experiment tracking)
#   hydra        → configs/hydra/*.yaml         (output directory layout)
#
# Examples
# --------
#   python main.py model=conformer
#   python main.py model=dgcnn preprocessing=de_features
#   python main.py wandb=disabled trainer.fast_dev_run=true
#   python main.py hydra=debug wandb=disabled trainer.fast_dev_run=true
#   python main.py --multirun model=eegnet,conformer,atcnet

defaults:
  - model: eegnet
  - data: mindbigdata
  - preprocessing: zscore
  - trainer: default
  - wandb: default
  - hydra: default
  - _self_

# ── Experiment metadata ────────────────────────────────────────────
experiment:
  name: null              # Tag for grouping runs (e.g. "baseline", "sweep_lr")
                          # → shows as prefix in W&B run name: "baseline/eegnet"
  seed: 42                # Global random seed for reproducibility
  project: "MindBigData2023"
