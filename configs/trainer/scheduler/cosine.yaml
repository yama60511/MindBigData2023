# ── Scheduler: CosineAnnealingLR ──────────────────────────────────
# Smoothly decays LR following a cosine curve from base LR to near 0.
# Works well for most models. Recommended with warmup for Transformers.
#
# Switch from CLI:  python main.py trainer/scheduler=cosine (default)

name: CosineAnnealingLR
T_max: ${trainer.max_epochs}   # Full cosine cycle = total training epochs
warmup_epochs: 10              # Linear LR warmup before cosine decay starts
                               # → Set to 0 to disable warmup
                               # → 5-10 recommended for Transformers
