# ── H100 x4 Trainer configuration ─────────────────────────────────
#
# Multi-GPU training on 4x NVIDIA H100 GPUs.
# Uses DDP (Distributed Data Parallel) for efficient scaling.
#
# Usage:
#   python main.py trainer=h100x4 model=conformer
#

max_epochs: 200
accelerator: gpu
devices: 4
strategy: ddp
patience: 30
fast_dev_run: false
deterministic: false           # false for max GPU throughput on H100

# ── Optimizer ──
optimizer: "AdamW"
scheduler: "CosineAnnealingLR"
warmup_epochs: 10
