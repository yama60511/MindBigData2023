# ── Trainer configuration ──────────────────────────────────────────
#
# Controls training duration, hardware, and stopping behavior.
# Optimizer and scheduler are separate config groups:
#   trainer/optimizer → configs/trainer/optimizer/*.yaml
#   trainer/scheduler → configs/trainer/scheduler/*.yaml
#
# Override from CLI:  python main.py trainer.max_epochs=200 trainer.patience=20

max_epochs: 50            # Maximum number of training epochs
                          # → Early stopping may halt training before this limit
accelerator: auto         # Hardware backend: "auto", "gpu", "cpu", "tpu"
                          # → "auto" picks GPU if available, else CPU
patience: 10              # EarlyStopping: stop if val_acc doesn't improve for N epochs
                          # → Set to 0 to disable early stopping entirely
fast_dev_run: false       # true = run 1 train + 1 val batch only (for debugging)
deterministic: true       # true = fully reproducible results (slightly slower)
