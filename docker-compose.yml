services:
  dev:
    build: .
    image: mbd2023-dev
    container_name: mbd2023
    volumes:
      - .:/workspace
    ports:
      - "8888:8888"
    env_file:
      - .env
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
